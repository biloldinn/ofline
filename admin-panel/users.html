<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foydalanuvchilar - Offline Reels Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-left">
                <h2><i class="fas fa-crown" style="color: #667eea;"></i> Offline Reels Admin</h2>
            </div>
            <div class="header-right">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <nav class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
                <li><a href="users.html" class="active"><i class="fas fa-users"></i><span>Foydalanuvchilar</span></a>
                </li>
                <li><a href="payments.html"><i class="fas fa-credit-card"></i><span>To'lovlar</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-users"></i> Barcha foydalanuvchilar</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Login</th>
                            <th>Premium</th>
                            <th>Premium Tugash vaqti</th>
                            <th>Amallar</th>
                        </tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'index.html';
        }

        function loadUsers() {
            fetch('/api/admin/users')
                .then(res => res.json())
                .then(users => {
                    const tbody = document.getElementById('userTable');
                    tbody.innerHTML = '';
                    users.forEach(u => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${u.login}</td>
                            <td>${u.premium ? '✅' : '❌'}</td>
                            <td>${u.premiumUntil ? new Date(u.premiumUntil).toLocaleString() : '-'}</td>
                            <td>
                                <button class="btn-action btn-reject" onclick="deleteUser('${u._id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function deleteUser(id) {
            if (confirm('Foydalanuvchini o\'chirmoqchimisiz?')) {
                fetch(`/api/admin/users/${id}`, { method: 'DELETE' })
                    .then(() => loadUsers());
            }
        }

        loadUsers();
    </script>
</body>

</html>
